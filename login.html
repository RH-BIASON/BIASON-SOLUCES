<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BIASON | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="auth.js"></script>
    <style>
      :root {
        --brand: #0f3152;
        --brand-2: #287fae;
        --action: #176ec5;
        --ink: #102033;
        --muted: #667085;
        --line: #d8e1ea;
        --danger: #b42318;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--ink);
        background: linear-gradient(120deg, #287fae 0%, #2f86b4 50%, #eef5fb 50%, #ffffff 100%);
        display: grid;
        place-items: center;
        padding: 18px;
      }

      .loginShell {
        width: min(1120px, 100%);
        min-height: 584px;
        display: grid;
        grid-template-columns: 1.02fr .98fr;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 22px 58px -30px rgba(12, 30, 45, .62);
        background: #fff;
      }

      .brandPanel {
        background: linear-gradient(145deg, #287fae 0%, #2c82ad 55%, #1b6f9c 100%);
        display: grid;
        place-items: center;
        padding: 44px;
      }

      .brandMark {
        width: min(360px, 82%);
        aspect-ratio: 1;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: #fff;
        text-align: center;
      }

      .brandName {
        font-size: clamp(44px, 7vw, 72px);
        line-height: .92;
        font-weight: 900;
        letter-spacing: .02em;
      }

      .brandSubtitle {
        margin-top: 8px;
        font-size: clamp(14px, 2vw, 21px);
        font-weight: 600;
        letter-spacing: .08em;
      }

      .formPanel {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 42px;
      }

      .loginCard {
        width: min(464px, 100%);
      }

      h1 {
        margin: 0 0 34px;
        color: #1a78aa;
        font-size: clamp(34px, 5vw, 42px);
        line-height: 1.05;
        text-align: center;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #27628c;
        font-size: 12px;
        font-weight: 700;
      }

      .field {
        margin-bottom: 18px;
      }

      .inputWrap {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 54px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 14px;
        background: #fff;
      }

      .inputWrap:focus-within {
        border-color: var(--action);
        box-shadow: 0 0 0 3px rgba(23, 110, 197, .14);
      }

      .inputIcon {
        width: 20px;
        color: #6b7280;
        text-align: center;
        font-weight: 800;
      }

      input[type="email"],
      input[type="password"],
      input[type="text"] {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        font: inherit;
        color: var(--ink);
        background: transparent;
      }

      .passwordToggle {
        border: 0;
        background: transparent;
        color: #6b7280;
        cursor: pointer;
        font-size: 13px;
        font-weight: 800;
      }

      .options {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin: 8px 0 34px;
        color: #344054;
        font-size: 14px;
      }

      .remember {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .submit {
        width: 100%;
        min-height: 44px;
        border: 0;
        border-radius: 7px;
        background: #176ec5;
        color: #fff;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 8px 16px -10px rgba(0, 0, 0, .72);
      }

      .submit:hover { background: #0e63b8; }

      .error {
        min-height: 22px;
        margin: -16px 0 14px;
        color: var(--danger);
        font-size: 13px;
        font-weight: 700;
        text-align: center;
      }

      .footer {
        margin-top: 34px;
        text-align: center;
        color: #6b7280;
        font-size: 13px;
      }

      .footer strong {
        color: #1a78aa;
      }

      @media (max-width: 820px) {
        body {
          background: linear-gradient(180deg, #287fae 0 34%, #f7fbff 34% 100%);
          padding: 0;
        }

        .loginShell {
          min-height: 100vh;
          grid-template-columns: 1fr;
          border-radius: 0;
        }

        .brandPanel {
          min-height: 230px;
          padding: 28px;
        }

        .formPanel {
          align-items: start;
          padding: 32px 20px 44px;
        }
      }
    </style>
  </head>
  <body>
    <main class="loginShell">
      <section class="brandPanel" aria-label="BIASON Assessoria Empresarial">
        <div class="brandMark">
          <div>
            <div class="brandName">BIASON</div>
            <div class="brandSubtitle">ASSESSORIA EMPRESARIAL</div>
          </div>
        </div>
      </section>

      <section class="formPanel">
        <form class="loginCard" id="loginForm">
          <h1>Seja bem vindo!</h1>

          <div class="field">
            <label for="email">Usuário ou Email *</label>
            <div class="inputWrap">
              <span class="inputIcon">@</span>
              <input id="email" name="email" type="email" autocomplete="username" required autofocus>
            </div>
          </div>

          <div class="field">
            <label for="password">Senha *</label>
            <div class="inputWrap">
              <span class="inputIcon">#</span>
              <input id="password" name="password" type="password" autocomplete="current-password" required>
              <button class="passwordToggle" type="button" id="togglePassword">VER</button>
            </div>
          </div>

          <div class="options">
            <label class="remember">
              <input id="remember" name="remember" type="checkbox">
              Lembrar-me
            </label>
          </div>

          <div class="error" id="loginError" aria-live="polite"></div>
          <button class="submit" type="submit">ENTRAR</button>

          <div class="footer">
            <strong>BIASON</strong> Assessoria Empresarial<br>
            2026 © Biason
          </div>
        </form>
      </section>
    </main>

    <script>
      const session = window.BiasonAuth.getSession();
      if (session) {
        window.location.replace("BIASON_Hub_Cliente.html");
      }

      const form = document.getElementById("loginForm");
      const email = document.getElementById("email");
      const password = document.getElementById("password");
      const remember = document.getElementById("remember");
      const error = document.getElementById("loginError");
      const togglePassword = document.getElementById("togglePassword");

      togglePassword.addEventListener("click", () => {
        const visible = password.type === "text";
        password.type = visible ? "password" : "text";
        togglePassword.textContent = visible ? "VER" : "OCULTAR";
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "";

        const result = await window.BiasonAuth.login(email.value, password.value, remember.checked);
        if (!result.ok) {
          error.textContent = "Email ou senha invalido.";
          password.select();
          return;
        }

        const params = new URLSearchParams(window.location.search);
        window.location.replace(params.get("next") || "BIASON_Hub_Cliente.html");
      });
    </script>
  </body>
</html>
