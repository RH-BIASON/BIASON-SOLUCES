<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BIASON | Login</title>
    <meta name="description" content="Acesso ao Hub de Solucoes RH da BIASON Assessoria Empresarial.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="BIASON">
    <meta property="og:title" content="BIASON | Hub de Solucoes RH">
    <meta property="og:description" content="Ferramentas online para rotinas de RH, folha, FGTS, DIRF, IRRF e documentos.">
    <meta property="og:url" content="https://rh-biason.github.io/BIASON-SOLUCES/login.html">
    <meta property="og:image" content="https://rh-biason.github.io/BIASON-SOLUCES/assets/biason-link-preview.jpg">
    <meta property="og:image:secure_url" content="https://rh-biason.github.io/BIASON-SOLUCES/assets/biason-link-preview.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="BIASON | Hub de Solucoes RH">
    <meta name="twitter:description" content="Ferramentas online para rotinas de RH, folha, FGTS, DIRF, IRRF e documentos.">
    <meta name="twitter:image" content="https://rh-biason.github.io/BIASON-SOLUCES/assets/biason-link-preview.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="auth.js"></script>
    <style>
      :root {
        --brand: #0f3152;
        --brand-2: #287fae;
        --action: #176ec5;
        --ink: #102033;
        --muted: #667085;
        --line: #d8e1ea;
        --danger: #b42318;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--ink);
        background: linear-gradient(120deg, #287fae 0%, #2f86b4 50%, #eef5fb 50%, #ffffff 100%);
        display: grid;
        place-items: center;
        padding: 18px;
      }

      .loginShell {
        width: min(1120px, 100%);
        min-height: 584px;
        display: grid;
        grid-template-columns: 1.02fr .98fr;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 22px 58px -30px rgba(12, 30, 45, .62);
        background: #fff;
      }

      .brandPanel {
        background: linear-gradient(145deg, #287fae 0%, #2c82ad 55%, #1b6f9c 100%);
        display: grid;
        place-items: center;
        padding: 44px;
      }

      .brandMark {
        width: min(360px, 82%);
        aspect-ratio: 1;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: #fff;
        text-align: center;
      }

      .brandName {
        font-size: clamp(44px, 7vw, 72px);
        line-height: .92;
        font-weight: 900;
        letter-spacing: .02em;
      }

      .brandSubtitle {
        margin-top: 8px;
        font-size: clamp(14px, 2vw, 21px);
        font-weight: 600;
        letter-spacing: .08em;
      }

      .formPanel {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 42px;
      }

      .loginCard {
        width: min(464px, 100%);
      }

      h1 {
        margin: 0 0 34px;
        color: #1a78aa;
        font-size: clamp(34px, 5vw, 42px);
        line-height: 1.05;
        text-align: center;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #27628c;
        font-size: 12px;
        font-weight: 700;
      }

      .field {
        margin-bottom: 18px;
      }

      .inputWrap {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 54px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 14px;
        background: #fff;
      }

      .inputWrap:focus-within {
        border-color: var(--action);
        box-shadow: 0 0 0 3px rgba(23, 110, 197, .14);
      }

      .inputIcon {
        width: 20px;
        color: #6b7280;
        text-align: center;
        font-weight: 800;
      }

      input[type="email"],
      input[type="password"],
      input[type="text"] {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        font: inherit;
        color: var(--ink);
        background: transparent;
      }

      .passwordToggle {
        border: 0;
        background: transparent;
        color: #6b7280;
        cursor: pointer;
        font-size: 13px;
        font-weight: 800;
      }

      .options {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin: 8px 0 34px;
        color: #344054;
        font-size: 14px;
      }

      .remember {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .submit {
        width: 100%;
        min-height: 44px;
        border: 0;
        border-radius: 7px;
        background: #176ec5;
        color: #fff;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 8px 16px -10px rgba(0, 0, 0, .72);
      }

      .submit:hover { background: #0e63b8; }

      .error {
        min-height: 22px;
        margin: -16px 0 14px;
        color: var(--danger);
        font-size: 13px;
        font-weight: 700;
        text-align: center;
      }

      .permissionCard {
        display: none;
        margin: 0 0 22px;
        padding: 18px;
        border: 1px solid #c7d7ea;
        border-radius: 12px;
        background: linear-gradient(145deg, #f8fbff, #edf4fb);
        text-align: center;
      }

      .permissionCard.isVisible {
        display: block;
      }

      .permissionCard strong {
        display: block;
        margin-bottom: 8px;
        color: #0b2240;
        font-size: 17px;
      }

      .permissionCard p {
        margin: 0 0 14px;
        color: #4b5f76;
        font-size: 13px;
        line-height: 1.45;
      }

      .permissionActions {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .permissionLink {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0 14px;
        border-radius: 9px;
        border: 1px solid #c7d7ea;
        color: #0f3152;
        text-decoration: none;
        font-size: 13px;
        font-weight: 800;
      }

      .permissionLink--primary {
        border-color: #0f3152;
        background: #0f3152;
        color: #fff;
      }

      .footer {
        margin-top: 34px;
        text-align: center;
        color: #6b7280;
        font-size: 13px;
      }

      .footer strong {
        color: #1a78aa;
      }

      body.vipLogin {
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 255, 255, .14), transparent 26%),
          linear-gradient(135deg, #061326 0%, #0b2240 48%, #0f3152 100%);
      }

      body.vipLogin .loginShell {
        background: rgba(255, 255, 255, .98);
        box-shadow: 0 28px 70px -34px rgba(0, 0, 0, .9);
      }

      body.vipLogin .brandPanel {
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, .08), transparent 35%),
          linear-gradient(150deg, #061326 0%, #0b2240 52%, #123b63 100%);
      }

      body.vipLogin .brandPanel::after {
        content: "ACESSO VIP";
        position: absolute;
        left: 34px;
        bottom: 34px;
        padding: 9px 14px;
        border: 1px solid rgba(255, 255, 255, .28);
        border-radius: 999px;
        color: rgba(255, 255, 255, .9);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: .14em;
      }

      body.vipLogin .brandMark {
        border: 1px solid rgba(255, 255, 255, .18);
        background: linear-gradient(145deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .02));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, .16), 0 26px 54px -36px rgba(0, 0, 0, .8);
      }

      body.vipLogin h1 {
        color: #0b2240;
      }

      body.vipLogin .loginCard::before {
        content: "Ferramenta restrita BIASON";
        display: block;
        width: max-content;
        max-width: 100%;
        margin: 0 auto 14px;
        padding: 8px 13px;
        border-radius: 999px;
        background: #eaf2fb;
        color: #0f3152;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: .12em;
        text-transform: uppercase;
      }

      body.vipLogin label {
        color: #0f3152;
      }

      body.vipLogin .submit {
        background: linear-gradient(135deg, #0b2240, #123b63);
        box-shadow: 0 10px 18px -12px rgba(5, 19, 38, .95);
      }

      body.vipLogin .submit:hover {
        background: linear-gradient(135deg, #061326, #0f3152);
      }

      body.vipLogin .footer strong {
        color: #0f3152;
      }

      @media (max-width: 820px) {
        body {
          background: linear-gradient(180deg, #287fae 0 34%, #f7fbff 34% 100%);
          padding: 0;
        }

        body.vipLogin {
          background: linear-gradient(180deg, #061326 0 34%, #f4f7fb 34% 100%);
        }

        .loginShell {
          min-height: 100vh;
          grid-template-columns: 1fr;
          border-radius: 0;
        }

        .brandPanel {
          min-height: 230px;
          padding: 28px;
        }

        .formPanel {
          align-items: start;
          padding: 32px 20px 44px;
        }
      }
    </style>
  </head>
  <body>
    <main class="loginShell">
      <section class="brandPanel" aria-label="BIASON Assessoria Empresarial">
        <div class="brandMark">
          <div>
            <div class="brandName">BIASON</div>
            <div class="brandSubtitle">ASSESSORIA EMPRESARIAL</div>
          </div>
        </div>
      </section>

      <section class="formPanel">
        <form class="loginCard" id="loginForm">
          <h1 id="loginTitle">Seja bem vindo!</h1>

          <div class="field">
            <label for="email">Usuário ou Email *</label>
            <div class="inputWrap">
              <span class="inputIcon">@</span>
              <input id="email" name="email" type="email" autocomplete="username" required autofocus>
            </div>
          </div>

          <div class="field">
            <label for="password">Senha *</label>
            <div class="inputWrap">
              <span class="inputIcon">#</span>
              <input id="password" name="password" type="password" autocomplete="current-password" required>
              <button class="passwordToggle" type="button" id="togglePassword">VER</button>
            </div>
          </div>

          <div class="options">
            <label class="remember">
              <input id="remember" name="remember" type="checkbox">
              Lembrar-me
            </label>
          </div>

          <div class="error" id="loginError" aria-live="polite"></div>
          <div class="permissionCard" id="permissionCard" aria-live="polite">
            <strong>Acesso VIP não liberado</strong>
            <p>Este módulo é restrito. Solicite à BIASON a liberação do seu e-mail para DIRF / IRPF ou Rubricas.</p>
            <div class="permissionActions">
              <a class="permissionLink permissionLink--primary" href="BIASON_Hub_Cliente.html">Voltar ao Hub</a>
              <a class="permissionLink" href="mailto:carlam@biason.net?subject=Solicitar%20acesso%20VIP%20BIASON">Solicitar acesso</a>
            </div>
          </div>
          <button class="submit" type="submit">ENTRAR</button>

          <div class="footer">
            <strong>BIASON</strong> Assessoria Empresarial<br>
            2026 © Biason
          </div>
        </form>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const requiredScope = params.get("scope") || "hub";
      const session = window.BiasonAuth.getSession(requiredScope);
      const isVipAccess = ["dirf", "rubricas"].includes(requiredScope);

      if (session && window.BiasonAuth.hasScope(session, requiredScope)) {
        window.location.replace(params.get("next") || "BIASON_Hub_Cliente.html");
      }

      const form = document.getElementById("loginForm");
      const email = document.getElementById("email");
      const password = document.getElementById("password");
      const remember = document.getElementById("remember");
      const error = document.getElementById("loginError");
      const togglePassword = document.getElementById("togglePassword");
      const loginTitle = document.getElementById("loginTitle");
      const permissionCard = document.getElementById("permissionCard");

      if (isVipAccess) {
        document.body.classList.add("vipLogin");
        document.title = "BIASON | Acesso VIP";
        loginTitle.textContent = "Seja bem vindo ao acesso VIP";
      }

      togglePassword.addEventListener("click", () => {
        const visible = password.type === "text";
        password.type = visible ? "password" : "text";
        togglePassword.textContent = visible ? "VER" : "OCULTAR";
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "";

        const result = await window.BiasonAuth.login(email.value, password.value, remember.checked, requiredScope);
        if (!result.ok) {
          if (result.forbidden) {
            error.textContent = "";
            permissionCard.classList.add("isVisible");
          } else {
            permissionCard.classList.remove("isVisible");
            error.textContent = "Email ou senha invalido.";
          }
          password.select();
          return;
        }

        window.location.replace(params.get("next") || "BIASON_Hub_Cliente.html");
      });
    </script>
  </body>
</html>
