<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>BIASON DIRF — Comprovante IRPF</title>
  <style>
    /*
     * Estilos gerais da aplicação
     * A página foi desenhada para desktop com um visual limpo e moderno.  
     * Todos os estilos e scripts estão embutidos para que o arquivo funcione
     * diretamente com file:// sem necessidade de servidor ou build.
     */
    :root {
      font-family: Arial, Helvetica, sans-serif;
      color: #333;
    }
    body {
      margin: 0;
      padding: 0;
      background: #f0f2f5;
    }
    .container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 20px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    h1 {
      font-size: 24px;
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      background: #fafafa;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #444;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
    .hint{
      grid-column: 1 / -1;
      padding: 10px 12px;
      border: 1px dashed #bbb;
      border-radius: 8px;
      background: #fafafa;
    }
    .hint label{
      display: flex;
      gap: 10px;
      align-items: flex-start;
      line-height: 1.25;
      flex-wrap: wrap;
    }
    .hint input[type="checkbox"]{
      margin-top: 2px;
      flex: 0 0 auto;
    }
    .hint b{ white-space: nowrap; }
    .hint small{ display:block; margin-top:6px; color:#555; }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }
    input[type="text"],
    input[type="date"],
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    .drop-zone {
      border: 2px dashed #007bff;
      padding: 30px;
      text-align: center;
      border-radius: 6px;
      background: #f5f9ff;
      color: #555;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .drop-zone.hover {
      background: #e8f3ff;
      border-color: #0056b3;
    }
    .file-list {
      margin-top: 10px;
      font-size: 14px;
    }
    .file-list ul {
      padding-left: 20px;
      margin: 0;
    }
    .file-list li {
      margin-bottom: 4px;
      list-style: disc;
    }
    .messages {
      margin-top: 10px;
      color: #a94442;
      background: #f2dede;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ebccd1;
      display: none;
      white-space: pre-line;
    }
    .messages.show {
      display: block;
    }
    .btn {
      display: inline-block;
      margin: 5px 10px 0 0;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background: #007bff;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s ease;
    }
    .btn:hover:not(:disabled) {
      background: #0056b3;
    }
    .btn:disabled {
      background: #888;
      cursor: not-allowed;
    }
    .preview {
      border: 1px solid #888;
      padding: 20px;
      margin-top: 20px;
      background: white;
      border-radius: 4px;
      font-size: 12px;
      /* Evitar quebras horizontais na impressão */
      overflow-x: auto;
    }
    /* Tabelas do comprovante com bordas similares ao modelo oficial */
    .comprovante-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 4px;
      table-layout: fixed;
    }
    .comprovante-table th,
    .comprovante-table td {
      border: 1px solid #000;
      padding: 4px 6px;
      font-size: 11px;
      vertical-align: top;
    }
    .comprovante-table .heading {
      background: #f0f0f0;
      font-weight: bold;
    }
    .comprovante-table .small-note {
      font-size: 9px;
    }
    .debug {
      white-space: pre-wrap;
      background: #f8f9fa;
      border: 1px solid #ced4da;
      padding: 10px;
      margin-top: 10px;
      display: none;
      font-family: monospace;
      max-height: 300px;
      overflow: auto;
      font-size: 13px;
    }
    /* Ocultar elementos na impressão */
    @media print {
      body {
        background: white;
      }
      .no-print {
        display: none !important;
      }
      .container {
        box-shadow: none;
        border: none;
      }
      .preview {
        border: none;
        padding: 0;
      }
    }
  
    /* Helpers */
    .upper { text-transform: uppercase; }
    .mono { font-variant-numeric: tabular-nums; }

    /* Cabeçalho estilo Receita (apenas no comprovante gerado) */
    .rfb-header td { vertical-align: middle; }
    .rfb-logo-cell { width: 85px; text-align: center; }
    .rfb-logo-cell img { height: 58px; width: auto; display: inline-block; }
    .rfb-center { text-align: center; font-weight: bold; }
    .rfb-right { width: 190px; text-align: center; font-weight: bold; }
    .preview {
      max-width: 860px;
      margin: 20px auto 0;
      overflow-x: visible;
    }
    .comprovante {
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
    }
    .comprovante-table {
      margin-bottom: 6px;
      break-inside: avoid;
    }
    .comprovante-table .heading {
      background: #e6e6e6;
      font-weight: bold;
      text-transform: uppercase;
    }
    .rfb-header td {
      padding: 6px 8px;
    }
    .rfb-logo-cell {
      width: 80px;
    }
    .rfb-logo-cell img {
      max-height: 56px;
    }
    .rfb-center {
      line-height: 1.2;
    }
    .rfb-right {
      width: 120px;
      vertical-align: middle;
    }
    .dirf-header-org {
      margin-bottom: 6px;
      font-size: 10px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .dirf-header-title {
      font-size: 12px;
      line-height: 1.25;
      text-transform: uppercase;
    }
    .dirf-field-label {
      display: block;
      margin-bottom: 3px;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .dirf-field-value {
      display: block;
      min-height: 16px;
      font-size: 11px;
      font-weight: bold;
      word-break: break-word;
    }
    .dirf-money-head {
      width: 110px;
      text-align: center;
      white-space: nowrap;
    }
    .dirf-money-col {
      width: 110px;
      text-align: right;
      white-space: nowrap;
    }
    .dirf-money {
      display: inline-block;
      min-width: 72px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .dirf-note-cell {
      font-size: 10px;
      line-height: 1.35;
    }
    .dirf-note-line {
      display: block;
      min-height: 15px;
    }
    .dirf-note-line + .dirf-note-line {
      margin-top: 3px;
    }
    .dirf-inline-note {
      display: block;
      margin-top: 4px;
      font-size: 10px;
      font-weight: normal;
    }
    .employee-report {
      margin-bottom: 22px;
    }
    .report-note {
      margin-bottom: 10px;
      padding: 10px 12px;
      border: 1px solid rgba(15,23,42,.10);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(248,250,252,.95), rgba(241,245,249,.9));
      color: #334155;
      font-size: 12px;
      line-height: 1.45;
    }
    .screen-only {
      display: block;
    }
    .signature-row td {
      height: 58px;
      vertical-align: bottom;
    }
    .signature-value {
      display: block;
      min-height: 30px;
    }
    .comprovante-footer td {
      font-size: 9.5px;
      text-align: left;
    }

    /* Ajustes de impressão para caber em 1 página */
    @media print {
      @page { size: A4; margin: 10mm; }
      body { background: white; }
      .container { margin: 0; padding: 0; max-width: none; }
      .preview { margin-top: 0; }
      .screen-only { display: none !important; }
      .comprovante-table th,
      .comprovante-table td { font-size: 10.5px; padding: 3px 5px; }
      .rfb-header td { padding: 5px 6px; }
      .dirf-header-title { font-size: 11px; }
      h1 { display: none !important; } /* título de tela */
    }

  </style>

  <style id="biason-hub-return">
    .hubReturnBar{position:fixed;right:18px;bottom:18px;z-index:120;display:flex}
    .hubReturnBtn{min-height:44px;padding:0 14px;border-radius:14px;border:1px solid rgba(15,23,42,.12);background:#fff;color:#081a24;font:700 13px Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;cursor:pointer;box-shadow:0 16px 30px -24px rgba(8,26,36,.55)}
    .hubReturnBtn:hover{transform:translateY(-1px);background:#f8fbfd}
    @page{size:A4;margin:12mm}
    @media print{body{background:#fff!important}.hubReturnBar{display:none!important}.card,.tableWrap,.panel,.kpi,.summary-item,.total-box,.verdict-box,.chart-container,.preview,.screenIntro{box-shadow:none!important;border-color:rgba(15,23,42,.18)!important}}
  </style>
  <script id="biason-hub-return-script">
    (function(){
      function biasonGoHub(){
        try{
          if(window.top && window.top !== window){
            window.top.postMessage({type:'BIASON_BACK_TO_HUB'}, '*');
            return;
          }
        }catch(err){}
        try{ window.location.href = new URL('dashboard_unico_ok5_atualizado.html', window.location.href).href; }
        catch(err){ window.location.href = 'dashboard_unico_ok5_atualizado.html'; }
      }
      document.addEventListener('DOMContentLoaded', function(){
        if(document.querySelector('.hubReturnBar')) return;
        var wrap = document.createElement('div');
        wrap.className = 'hubReturnBar';
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'hubReturnBtn';
        btn.textContent = 'Voltar ao Hub';
        btn.addEventListener('click', biasonGoHub);
        wrap.appendChild(btn);
        document.body.appendChild(wrap);
      });
      window.biasonGoHub = biasonGoHub;
    })();
  </script>

</style>
</head>
<body>
    <header class="topbar no-print biasonShellHeader">
    <div class="biasonShellHeader__inner">
      <div class="biasonShellHeader__left">
        <div class="biasonShellHeader__brand">BIASON</div>
        <div class="biasonShellHeader__divider">|</div>
        <div class="biasonShellHeader__tool">DIRF / IRPF</div>
        <div class="biasonShellHeader__crumb">Página: Relatório</div>
      </div>
    </div>
  </header>
  <div class="container">
    <h1>BIASON DIRF — Comprovante IRPF</h1>
    <!-- Área de upload -->
    <div class="card no-print">
      <h2>Upload de XMLs S‑5002</h2>
      <!-- Input escondido para selecionar arquivos -->
      <input type="file" id="xmlFiles" multiple accept=".xml" style="display:none;" />
      <div id="dropZone" class="drop-zone">Clique ou arraste os XMLs do ano (01..12) aqui</div>
      <div id="fileList" class="file-list"></div>
    </div>
    <!-- Área de dados manuais -->
    <div class="card no-print">
      <h2>Dados do Comprovante</h2>
      <div class="grid">
        <div>
          <label for="pagadoraNome">Fonte Pagadora — Nome</label>
          <input type="text" id="pagadoraNome" />
        </div>
        <div>
          <label for="pagadoraInsc">Fonte Pagadora — CNPJ/CPF</label>
          <input type="text" id="pagadoraInsc" />
        </div>
        <div>
          <label for="benefNome">Beneficiário — Nome</label>
          <input type="text" id="benefNome" />
        </div>
        <div>
          <label for="benefCPF">Beneficiário — CPF</label>
          <input type="text" id="benefCPF" />
        </div>
        <div>
          <label for="natureza">Natureza do rendimento</label>
          <input type="text" id="natureza" value="Trabalhador Assalariado" />
        </div>
<div>
          <label for="anoCal">Ano‑calendário</label>
          <input type="text" id="anoCal" maxlength="4" />
        </div>
        <div>
          <label for="dataEmissao">Data de emissão</label>
          <input type="date" id="dataEmissao" />
        </div>
        <div>
          <label for="responsavel">Responsável — Nome</label>
          <input type="text" id="responsavel" />
        </div>
        <div>
          <label for="responsavelCPF">Responsável — CPF</label>
          <input type="text" id="responsavelCPF" />
        </div>
        <div style="grid-column: 1 / -1;">
          <label for="infoCompl">Informações complementares</label>
          <textarea id="infoCompl"></textarea>
        </div>
      </div>
    </div>
    <!-- Botões de ação -->
    <div class="no-print">
      <button id="generateBtn" class="btn">Gerar comprovante</button>
      <button id="printBtn" class="btn" disabled>Imprimir / Salvar PDF</button>
      <button id="clearBtn" class="btn">Limpar</button>
      <button id="debugBtn" class="btn">Debug</button>
    </div>
    <!-- Painel de mensagens -->
    <div id="messages" class="messages"></div>
    <!-- Painel de debug (toggle) -->
    <div id="debugPanel" class="debug"></div>
    <!-- Pré‑visualização do comprovante -->
    <div id="preview" class="preview"></div>
  </div>
  <script>
  (function() {
    'use strict';
    // Mapa para armazenar arquivos por mês (1..12)
    const filesMap = {};
    // Conjunto de CPF encontrados nos XMLs
    const cpfSet = new Set();
    // Conjunto de anos encontrados
    const yearsSet = new Set();
    // Conjunto de inscrições da fonte pagadora encontradas
    const estabSet = new Set();
    // Mensagens de aviso/erro
    let warnings = [];
    // Informações de extração por categoria
    const categories = {
      rendTrib: { label: 'Rendimentos Tributáveis (sujeitos ao ajuste anual)', names: ['vlrRendTrib','vlrRendTribMen','vlrBaseIR','vlrBaseCalc'], },
      prev:     { label: 'Contribuição previdenciária oficial', names: ['vlrPrevOficial','vlrPrevOficialMen'], },
      irrf:     { label: 'Imposto de renda retido na fonte', names: ['vlrCRMen','vlrIRRF','vlrImposto','vlrCR'], },
      isento:   { label: 'Rendimentos isentos e não tributáveis', names: ['vlrRendIsento','vlrRendIsentos','vlrParcIsenta65','vlrParcIsenta65Dec','vlrRendMoleGrave','vlrRendMoleGrave13','vlrDiarias','vlrAjudaCusto','vlrIndResContrato','vlrAbonoPec','vlrAuxMoradia','vlrBolsaMedico','vlrBolsaMedico13','vlrJurosMora','vlrIsenOutros'], },
      exclusivo:{ label: 'Rendimentos sujeitos à tributação exclusiva', names: ['vlrRendExclusivo','vlrOutros','vlrRendExc'], },
      sal13:    { label: '13º salário', names: ['vlrRendTrib13','vlrRendTrib13Men'], }
    };
    // Elementos DOM
    const fileInput    = document.getElementById('xmlFiles');
    const dropZone     = document.getElementById('dropZone');
    const fileListDiv  = document.getElementById('fileList');
    const messagesDiv  = document.getElementById('messages');
    const previewDiv   = document.getElementById('preview');
    const debugPanel   = document.getElementById('debugPanel');
    const generateBtn  = document.getElementById('generateBtn');
    const printBtn     = document.getElementById('printBtn');
    const clearBtn     = document.getElementById('clearBtn');
    const debugBtn     = document.getElementById('debugBtn');
    // Campos de entrada
    const pagadoraNome  = document.getElementById('pagadoraNome');
    const pagadoraInsc  = document.getElementById('pagadoraInsc');
    const benefNome     = document.getElementById('benefNome');
    const benefCPF      = document.getElementById('benefCPF');
    const natureza      = document.getElementById('natureza');
    const anoCal        = document.getElementById('anoCal');
    const dataEmissao   = document.getElementById('dataEmissao');
    const responsavel   = document.getElementById('responsavel');
    const responsavelCPF = document.getElementById('responsavelCPF');
const infoCompl     = document.getElementById('infoCompl');

    // Normalização automática (maiúsculas e máscara CPF/CNPJ)
    [pagadoraNome, benefNome, natureza, responsavel].forEach(el => {
      el.addEventListener('input', () => toUpperInPlace(el));
      el.addEventListener('blur',  () => toUpperInPlace(el));
    });
    [pagadoraInsc, benefCPF, responsavelCPF].forEach(el => {
      el.addEventListener('blur', () => maskDocInPlace(el));
    });

    // Inicializar data de emissão com hoje
    (function initDate() {
      const today = new Date();
      const iso = today.toISOString().slice(0, 10);
      dataEmissao.value = iso;
    })();

    // ====== Formatação e normalização ======
    function onlyDigits(s) { return String(s || '').replace(/\D+/g, ''); }
    function formatCPF(raw) {
      const d = onlyDigits(raw).padStart(11, '0').slice(-11);
      return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
    }
    function formatCNPJ(raw) {
      const d = onlyDigits(raw).padStart(14, '0').slice(-14);
      return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
    }
    function formatDoc(raw) {
      const d = onlyDigits(raw);
      if (d.length <= 11) return formatCPF(d);
      return formatCNPJ(d);
    }
    function toUpperInPlace(el) {
      if (!el) return;
      el.value = (el.value || '').toUpperCase();
    }
    function maskDocInPlace(el) {
      if (!el) return;
      const d = onlyDigits(el.value);
      if (!d) return;
      el.value = formatDoc(d);
    }

    // Utilitário: encontra o primeiro texto de tags com nomes locais especificados
    function getFirstText(xmlDoc, names) {
      for (const name of names) {
        const nodes = xmlDoc.getElementsByTagNameNS('*', name);
        for (let i = 0; i < nodes.length; i++) {
          const text = nodes[i].textContent;
          if (text && text.trim() !== '') {
            return text.trim();
          }
        }
      }
      return null;
    }
    // Utilitário: extrai todos os valores numéricos de tags com nomes locais especificados
    function sumValues(xmlDoc, names) {
      let total = 0;
      let found = false;
      for (const name of names) {
        const nodes = xmlDoc.getElementsByTagNameNS('*', name);
        for (let i = 0; i < nodes.length; i++) {
          const txt = nodes[i].textContent;
          if (txt && txt.trim() !== '') {
            // substitui vírgula por ponto caso necessário
            const val = parseFloat(txt.replace(',', '.'));
            if (!isNaN(val)) {
              total += val;
              found = true;
            }
          }
        }
      }
      return { total, found };
    }
    // Atualiza lista de arquivos carregados
    function updateFileList() {
      const months = Object.keys(filesMap).map(x => parseInt(x, 10)).sort((a,b) => a - b);
      let html = '';
      if (months.length > 0) {
        html += '<ul>';
        months.forEach(m => {
          const data = filesMap[m];
          html += '<li>Mês ' + String(m).padStart(2, '0') + '/' + data.year + ': ' + data.fileName + '</li>';
        });
        html += '</ul>';
      } else {
        html = '<em>Nenhum arquivo carregado</em>';
      }
      fileListDiv.innerHTML = html;
    }
    // Atualiza painel de avisos
    function updateMessages() {
      if (warnings.length) {
        messagesDiv.textContent = warnings.join('\n');
        messagesDiv.classList.add('show');
      } else {
        messagesDiv.textContent = '';
        messagesDiv.classList.remove('show');
      }
    }
    // Manipula arquivos selecionados (via input ou drop)
    async function handleFiles(fileList) {
      warnings = [];
      const files = Array.from(fileList);
      for (const file of files) {
        const nameLower = file.name.toLowerCase();
        if (!nameLower.endsWith('.xml')) {
          warnings.push('Ignorando arquivo não‑XML: ' + file.name);
          continue;
        }
        try {
          await parseSingleFile(file);
        } catch (e) {
          warnings.push('Erro ao processar ' + file.name + ': ' + e.message);
        }
      }
      // Pós‑processamento: verificar meses faltantes
      const loadedMonths = Object.keys(filesMap).map(m => parseInt(m, 10)).sort((a,b)=>a-b);

      if (loadedMonths.length > 0) {
        const minM = loadedMonths[0];
        const maxM = loadedMonths[loadedMonths.length - 1];

        // Se o funcionário não trabalhou o ano inteiro, é normal não ter 12 meses.
        // Neste caso, apenas alertamos se houver "buracos" dentro do intervalo carregado.
        for (let i = minM; i <= maxM; i++) {
          if (!loadedMonths.includes(i)) {
            warnings.push('Arquivo do mês ' + String(i).padStart(2, '0') + ' não encontrado (dentro do período informado).');
          }
        }

        // Mensagem informativa (não é erro): período considerado
        if (loadedMonths.length < 12) {
          const monthLabel = (n) => String(n).padStart(2, '0');
          warnings.push('Período considerado: ' + monthLabel(minM) + ' a ' + monthLabel(maxM) + ' (' + loadedMonths.length + ' mês(es) carregado(s)).');
        }
      }
      // Se mais de um ano foi encontrado, alerta
      if (yearsSet.size > 1) {
        warnings.push('Arquivos com anos diferentes encontrados: ' + Array.from(yearsSet).sort().join(', ') + '.');
      }
      // Se múltiplos CPFs encontrados, alerta
      if (cpfSet.size > 1) {
        warnings.push('CPFs divergentes encontrados nos XMLs: ' + Array.from(cpfSet).join(', ') + '.');
      }
      updateFileList();
      updateMessages();
      // Sugerir valores para campos manuais
      if (!benefCPF.value && cpfSet.size === 1) {
        benefCPF.value = Array.from(cpfSet)[0];
        maskDocInPlace(benefCPF);
      }
      if (!anoCal.value && yearsSet.size === 1) {
        anoCal.value = String(Array.from(yearsSet)[0]);
      }
      if (!pagadoraInsc.value && estabSet.size === 1) {
        pagadoraInsc.value = Array.from(estabSet)[0];
        maskDocInPlace(pagadoraInsc);
      }
      // Inferir nome do beneficiário a partir do primeiro arquivo carregado, se possível
      if (!benefNome.value) {
          const firstMonth = Object.keys(filesMap).map(x => parseInt(x, 10)).sort((a,b) => a - b)[0];
          if (firstMonth) {
            const data = filesMap[firstMonth];
            const inferredName = inferNameFromFileName(data.fileName);
            if (inferredName) {
              benefNome.value = inferredName;
            }
          }
      }
    }
    // Infere nome do beneficiário a partir do nome do arquivo (após padrão MMYYYY_)
    function inferNameFromFileName(fileName) {
      // Remove extensão
      const base = fileName.replace(/\.[^/.]+$/, '');
      // Procura padrão de dois dígitos + quatro dígitos + separador (underscore ou espaço)
      const match = base.match(/(?:^|[^0-9])(\d{2})(\d{4})[_\s-]+(.+)/);
      if (match) {
        let namePart = match[3];
        // Substitui underscore por espaço e remove números
        namePart = namePart.replace(/_/g, ' ').trim();
        return namePart;
      }
      return '';
    }
    // Analisa um único arquivo XML e armazena dados em filesMap
    async function parseSingleFile(file) {
      const text = await file.text();
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(text, 'application/xml');
      // Determina mês/ano pelo nome do arquivo (primeira ocorrência 2 dígitos + 4 dígitos)
      let month = null;
      let year  = null;
      const nameMatch = file.name.match(/(\d{2})(\d{4})/);
      if (nameMatch) {
        month = parseInt(nameMatch[1], 10);
        year  = parseInt(nameMatch[2], 10);
      }
      // Se falhar no nome, tenta a partir de tags perApur, perRef, periodo, compet, ano, mes
      if (!month || !year) {
        const per = getFirstText(xmlDoc, ['perApur','perRef','periodo','compet','ano','mes']);
        if (per) {
          // procura padrões AAAA-MM ou AAAAMM ou MMYYYY
          let m;
          let y;
          let res = /^(\d{4})-(\d{2})/.exec(per);
          if (res) {
            y = parseInt(res[1], 10);
            m = parseInt(res[2], 10);
          } else if (/^(\d{6})$/.test(per)) {
            const all = per.replace(/\D/g, '');
            y = parseInt(all.slice(0,4), 10);
            m = parseInt(all.slice(4), 10);
          } else {
            // procura MMYYYY em qualquer posição
            const res2 = /(?:^|[^0-9])(\d{2})(\d{4})(?:[^0-9]|$)/.exec(per);
            if (res2) {
              m = parseInt(res2[1], 10);
              y = parseInt(res2[2], 10);
            }
          }
          if (m && y) {
            month = m;
            year  = y;
          }
        }
      }
      if (!month || !year) {
        warnings.push('Não foi possível identificar mês/ano para ' + file.name + '. Ignorando.');
        return;
      }
      if (month < 1 || month > 12) {
        warnings.push('Mês inválido detectado em ' + file.name + ': ' + month + '.');
      }
      // Adiciona ano ao conjunto
      yearsSet.add(year);
      // Extrai CPF do beneficiário
      const cpf = getFirstText(xmlDoc, ['cpfBenef','cpf','cpfTrab','cpfBeneficiario']);
      if (cpf) {
        cpfSet.add(cpf);
      }
      // Extrai a inscrição mais completa da fonte pagadora (prefere CNPJ de estabelecimento)
      const nrInscNodes = xmlDoc.getElementsByTagNameNS('*','nrInsc');
      let bestInsc = '';
      Array.from(nrInscNodes).forEach(node => {
        const digits = onlyDigits(node.textContent || '');
        if (digits.length > bestInsc.length) bestInsc = digits;
      });
      if (bestInsc) {
        estabSet.add(bestInsc);
      }
      // --- Nova extração de valores seguindo regras oficiais ---
      // Vamos procurar primeiro nós consolidApurMen (totais consolidados). Se não encontrar, usar totApurMen
      const totalsByTag = {};
      // Função para acumular valores de um nó contendo valores
      function accumulateValues(node) {
        Array.from(node.children).forEach(child => {
          const name = child.localName || child.tagName.split(':').pop();
          const txt = child.textContent;
          if (!txt) return;
          const val = parseFloat(txt.replace(',', '.'));
          if (!isNaN(val)) {
            totalsByTag[name] = (totalsByTag[name] || 0) + val;
          }
        });
      }
      // Consolidado mensal (consolidApurMen / totApurMen)
      // Alguns XMLs podem conter múltiplos blocos (ex.: evento repetido, folhas distintas no mesmo mês).
      // Regra aqui: acumular TODOS os blocos, mas DESCONSIDERAR duplicados idênticos.
      function signatureOfNode(node) {
        const parts = [];
        Array.from(node.children).forEach(child => {
          const name = child.localName || child.tagName.split(':').pop();
          const txt = (child.textContent || '').trim();
          if (!txt) return;
          const val = parseFloat(txt.replace(',', '.'));
          if (!isNaN(val)) parts.push(name + '=' + val);
        });
        parts.sort();
        return parts.join('|');
      }

      const seenSigs = new Set();
      const consolidList = xmlDoc.getElementsByTagNameNS('*','consolidApurMen');
      if (consolidList && consolidList.length > 0) {
        Array.from(consolidList).forEach(node => {
          const sig = signatureOfNode(node);
          if (sig && !seenSigs.has(sig)) {
            seenSigs.add(sig);
            accumulateValues(node);
          }
        });
      } else {
        const totList = xmlDoc.getElementsByTagNameNS('*','totApurMen');
        if (totList && totList.length > 0) {
          Array.from(totList).forEach(node => {
            const sig = signatureOfNode(node);
            if (sig && !seenSigs.has(sig)) {
              seenSigs.add(sig);
              accumulateValues(node);
            }
          });
        }
      }

      // Fallback para XMLs evtBasesTrab (como os XMLs mensais de bases que você enviou).
      // Nesses arquivos, os valores vêm em infoBaseCS/tpValor:
      // 11 = remuneração base tributável do mês
      // 21 = contribuição previdenciária do segurado
      // ind13 = 1 separa valores do 13º.
      const hasConsolidatedTotals =
        Object.keys(totalsByTag).some(key =>
          ['vlrRendTrib', 'vlrPrevOficial', 'vlrRendTrib13', 'vlrPrevOficial13', 'vlrCRMen', 'vlrCR13Men'].includes(key)
        );
      const infoBaseCSList = xmlDoc.getElementsByTagNameNS('*','infoBaseCS');
      if (infoBaseCSList && infoBaseCSList.length > 0 && !hasConsolidatedTotals) {
        const seenBases = new Set();
        Array.from(infoBaseCSList).forEach(node => {
          const ind13 = getFirstText(node, ['ind13']) || '0';
          const tpValor = getFirstText(node, ['tpValor']) || '';
          const valorTxt = getFirstText(node, ['valor']) || '0';
          const valor = parseFloat(valorTxt.replace(',', '.'));
          if (isNaN(valor) || valor <= 0) return;
          const sig = [ind13, tpValor, valor].join('|');
          if (seenBases.has(sig)) return;
          seenBases.add(sig);

          let targetKey = '';
          if (tpValor === '11') {
            targetKey = ind13 === '1' ? 'vlrRendTrib13' : 'vlrRendTrib';
          } else if (tpValor === '21') {
            targetKey = ind13 === '1' ? 'vlrPrevOficial13' : 'vlrPrevOficial';
          }

          if (targetKey) {
            totalsByTag[targetKey] = (totalsByTag[targetKey] || 0) + valor;
          }
        });
      }

      // Fallback extra para previdência quando o XML não traz o consolidado fiscal,
      // mas informa vrDescSeg / vrCpSeg em infoCpCalc.
      if ((totalsByTag['vlrPrevOficial'] || 0) === 0) {
        const prevNodes = xmlDoc.getElementsByTagNameNS('*','vrDescSeg');
        let prevFallback = 0;
        Array.from(prevNodes).forEach(node => {
          const val = parseFloat((node.textContent || '0').replace(',', '.'));
          if (!isNaN(val) && val > 0) prevFallback += val;
        });
        if (prevFallback > 0) {
          totalsByTag['vlrPrevOficial'] = prevFallback;
        }
      }

      // Plano de saúde (infoIRComplem/planSaude) — pode repetir; dedup por assinatura e soma por operadora
      const planSaudeList = xmlDoc.getElementsByTagNameNS('*','planSaude');
      const planRows = [];
      if (planSaudeList && planSaudeList.length > 0) {
        const seenPlan = new Set();
        Array.from(planSaudeList).forEach(ps => {
          const cnpj = getFirstText(ps, ['cnpjOper']) || '';
          const reg  = getFirstText(ps, ['regANS']) || '';
          const tit  = parseFloat((getFirstText(ps, ['vlrSaudeTit']) || '0').replace(',', '.')) || 0;
          const dep  = parseFloat((getFirstText(ps, ['vlrSaudeDep']) || '0').replace(',', '.')) || 0;
          const sig = [cnpj, reg, tit, dep].join('|');
          if (!seenPlan.has(sig)) {
            seenPlan.add(sig);
            if (cnpj || reg || tit || dep) planRows.push({cnpjOper: cnpj, regANS: reg, vlrSaudeTit: tit, vlrSaudeDep: dep});
          }
        });
      }
// Extrai infoIR e soma Pensão (tpInfoIR=51/52/53) + Exclusiva (tpInfoIR=14)
      // Observação: o XML pode repetir o evento completo; para evitar duplicidade,
      // lemos apenas o primeiro evtIrrfBenef encontrado.
      let descontos79Abs = 0;
      let pensaoSum = 0;
      let exclusivo14Sum = 0;
      let dedDep13Sum = 0; // Dedução dependentes aplicada ao 13º (dedDepen tpRend 12/13)
      let descontos79Desc = '';
      try {
        const evtList = xmlDoc.getElementsByTagNameNS('*','evtIrrfBenef');
        const baseEvt = (evtList && evtList.length > 0) ? evtList[0] : xmlDoc;
        const infoList = baseEvt.getElementsByTagNameNS('*','infoIR');
        for (const info of Array.from(infoList)) {
          const tp = getFirstText(info, ['tpInfoIR']);
          const valorTxt = getFirstText(info, ['valor']);
          const desc = getFirstText(info, ['descRendimento']) || '';
          const valor = valorTxt ? parseFloat(valorTxt.replace(',', '.')) : NaN;
          if ((tp === '51' || tp === '52' || tp === '53') && !isNaN(valor) && valor > 0) {
            pensaoSum += valor;
          }
          // tpInfoIR=14: outros rendimentos sujeitos à tributação exclusiva (ex.: verbas não sujeitas ao ajuste anual)
          if (tp === '14' && !isNaN(valor) && valor > 0) {
            exclusivo14Sum += valor;
          }
        }
      } catch (e) {
        // ignora: infoIR é opcional
      }

      // Dedução de dependentes do 13º (dedDepen).
      // Observações (conforme XMLs do eSocial):
      // - tpRend pode aparecer como 11/12/13. Para 13º usamos a prioridade: 13 > 12 > 11.
      // - Alguns XMLs repetem os mesmos dependentes em mais de um bloco/evento. Para não supercontar:
      //   deduplica por cpfDep dentro de cada tpRend, pegando o MAIOR vlrDedDep por cpf.
      // - depIRRF às vezes não vem no XML; quando ausente, assumimos 'S' (considera na dedução).
      try {
        const evtList2 = xmlDoc.getElementsByTagNameNS('*','evtIrrfBenef');
        const baseEvt2 = (evtList2 && evtList2.length > 0) ? evtList2[0] : xmlDoc;
        const dedNodes = baseEvt2.getElementsByTagNameNS('*','dedDepen');

        const maps = { '11': new Map(), '12': new Map(), '13': new Map() }; // cpfDep -> vlrDedDep (max)

        for (const dd of Array.from(dedNodes)) {
          const tpRend = ((dd.getElementsByTagNameNS('*','tpRend')[0]?.textContent)||'').trim();
          const depIRRFraw = ((dd.getElementsByTagNameNS('*','depIRRF')[0]?.textContent)||'').trim().toUpperCase();
          const depIRRF = depIRRFraw ? depIRRFraw : 'S';
          const cpfDep = ((dd.getElementsByTagNameNS('*','cpfDep')[0]?.textContent)||'').trim();
          const v = parseFloat((((dd.getElementsByTagNameNS('*','vlrDedDep')[0]?.textContent)||'0').trim()).replace(',', '.')) || 0;

          if (!cpfDep || depIRRF !== 'S' || !(v > 0)) continue;
          if (!(tpRend in maps)) continue;

          const cur = maps[tpRend].get(cpfDep) || 0;
          if (v > cur) maps[tpRend].set(cpfDep, v);
        }

        function sumMap(m) { let t = 0; for (const v of m.values()) t += v; return t; }
        const sum11 = sumMap(maps['11']);
        const sum12 = sumMap(maps['12']);
        const sum13 = sumMap(maps['13']);

        // Prioridade: 13 > 12 > 11
        const picked = (sum13 > 0) ? sum13 : ((sum12 > 0) ? sum12 : sum11);
        
        // Só aplica dedução de dependentes do 13º quando o arquivo/mês contém valores de 13º
        const bruto13Mes = (totalsByTag['vlrRendTrib13'] || 0);
        const inss13Mes  = (totalsByTag['vlrPrevOficial13'] || 0);
        const ir13Mes    = (totalsByTag['vlrCR13Men'] || 0);
        if ((bruto13Mes > 0) || (inss13Mes > 0) || (ir13Mes > 0)) {
          dedDep13Sum += picked;
        }

      } catch (e) {
        // ignora: dedDepen é opcional
      }



      totalsByTag['_pensaoSum'] = pensaoSum;
      totalsByTag['_exclusivo14Sum'] = exclusivo14Sum;
      totalsByTag['_dedDep13Sum'] = dedDep13Sum;

      // Reclassificação: quando o XML traz tpInfoIR=14, esses valores NÃO devem ir para
      // "1.Total dos rendimentos (inclusive férias)" e sim para
      // "5. Rendimentos sujeitos à tributação exclusiva" -> "3.Outros rendimentos..."
      if (exclusivo14Sum > 0) {
        const rt = (totalsByTag['vlrRendTrib'] || 0);
        totalsByTag['vlrRendTrib'] = Math.max(0, rt - exclusivo14Sum);
        totalsByTag['vlrRendExclusivo'] = (totalsByTag['vlrRendExclusivo'] || 0) + exclusivo14Sum;
      }

      // Helpers to sum fields
      function addTo(cat, names) {
        let sum = 0;
        for (const n of names) {
          if (totalsByTag[n] !== undefined) {
            sum += totalsByTag[n];
          }
        }
        if (sum > 0) {
          totals[cat] += sum;
          foundFlags[cat] = true;

      }
      // Rendimentos tributáveis (não incluir 13º). Somente vlrRendTrib é suficiente
      addTo('rendTrib', ['vlrRendTrib']);
      // Contribuição previdenciária oficial (somente remuneração mensal)
      addTo('prev', ['vlrPrevOficial']);

      if (pensaoSum > 0) {

      addTo('isento', ['vlrRendIsento','vlrRendIsentos','vlrParcIsenta65','vlrParcIsenta65Dec','vlrRendMoleGrave','vlrRendMoleGrave13','vlrDiarias','vlrAjudaCusto','vlrIndResContrato','vlrAbonoPec','vlrAuxMoradia','vlrBolsaMedico','vlrBolsaMedico13','vlrJurosMora','vlrIsenOutros']);

      };

      renderMoneySection('3-RENDIMENTOS TRIBUTÁVEIS, DEDUÇÕES E IMPOSTO RETIDO NA FONTE', [
        { label: '01-Total dos Rendimentos (inclusive Férias):', value: totalRendTrib },
        { label: '02-Contribuição Previdenciária Oficial:', value: totalPrevRegular },
        { label: '03-Contribuição à Previdência Privada e ao Fundo de Aposentadoria Programada Individual - FAPI:', value: 0 },
        { label: '04-Pensão Alimentícia (informar o beneficiário no quadro 06):', value: totalPensao },
        { label: '05-Imposto de Renda Retido:', value: totalIRRegular }
      ]);

      renderMoneySection('4-RENDIMENTOS ISENTOS E NÃO TRIBUTÁVEIS', [
        { label: '01-Parcela Isenta dos Proventos de Aposentadoria, Reserva, Reforma e Pensão (65 anos ou mais):', value: isentos.row1 },
        { label: '02-Diárias e Ajudas de Custo:', value: isentos.row3 },
        { label: '03-Pensão, Proventos de Aposentadoria ou Reforma por Moléstia Grave e Aposentadoria ou Reforma por Acidente em Serviço:', value: isentos.row5 },
        { label: '04-Lucro e Dividendo Apurado a partir de 1996 pago por PJ (Lucro Real, Presumido ou Arbitrado):', value: 0 },
        { label: '05-Valores Pagos ao Titular ou Sócio da Microempresa ou Empresa de Pequeno Porte, exceto Pro-labore, Aluguéis ou Serviços Prestados:', value: 0 },
        { label: '06-Indenizações por rescisão de contrato de trabalho, inclusive a título de PDV, e acidente de trabalho:', value: isentos.row4 },
        { label: quadro4OutrosLabel, value: quadro4OutrosValor }
      ]);

      renderMoneySection('5-RENDIMENTOS SUJEITOS À TRIBUTAÇÃO EXCLUSIVA (RENDIMENTO LÍQUIDO)', [
        { label: '01-Décimo Terceiro Salário:', value: net13 },
        { label: '02-Imposto sobre a Renda Retido na Fonte sobre 13º salário:', value: totalIR13 },
        { label: '03-Outros:', value: exclusivoOutros }
      ]);

      html += '<table class="comprovante-table">';
      html += '<tr class="heading"><td>6-INFORMAÇÕES COMPLEMENTARES</td></tr>';
      html += '<tr><td class="dirf-note-cell">' + infoHTML + '</td></tr>';
      html += '</table>';

      html += '<table class="comprovante-table">';
      html += '<tr class="heading"><td colspan="3">7-RESPONSÁVEL PELAS INFORMAÇÕES</td></tr>';
      html += '<tr><td><span class="dirf-field-label">NOME</span></td><td><span class="dirf-field-label">DATA</span></td><td><span class="dirf-field-label">ASSINATURA</span></td></tr>';
      html += '<tr class="signature-row"><td><span class="dirf-field-value">' + responsavelInfo + '</span></td><td><span class="dirf-field-value">' + (dataEmissao.value ? escapeHtml(formatDate(dataEmissao.value)) : '&nbsp;') + '</span></td><td><span class="signature-value">&nbsp;</span></td></tr>';
      html += '</table>';

      html += '<table class="comprovante-table comprovante-footer">';
      html += '<tr><td>Aprovado pela IN/SRF nº 120/2000.</td></tr>';
      html += '</table>';
      html += '</div>';
      html += '</section>';
      previewDiv.innerHTML = html;
      // Habilitar botão de impressão
      printBtn.disabled = false;
      // Atualizar painel de debug com dados agregados
      const debugObj = {
        arquivos: Object.values(filesMap)
          .sort((a,b) => a.month - b.month)
          .map(item => ({
            mes: item.month,
            ano: item.year,
            arquivo: item.fileName,
            totals: item.totals,
            found: item.found,
            raw: item.raw || {}
          })),
        aggregateRaw: aggregateRaw,
        calculos: {
          totalRendTrib,
          totalPrevRegular,
          totalPrev13,
          totalIRRegular,
          totalIR13,
          totalRend13,
          totalDedDep13,
          net13,
          isentos,
          exclusivoOutros
        }
      };
      debugPanel.textContent = JSON.stringify(debugObj, null, 2);
    }
    // Eventos da área de drop
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('hover');
    });
    dropZone.addEventListener('dragleave', (e) => {
      dropZone.classList.remove('hover');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('hover');
      const items = e.dataTransfer.files;
      handleFiles(items);
    });
    // Evento de mudança do input de arquivos
    fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
    });
    // Botão gerar
    generateBtn.addEventListener('click', () => {
      generatePreview();
    });
    // Botão imprimir
    printBtn.addEventListener('click', () => {
      window.print();
    });
    // Botão limpar
    clearBtn.addEventListener('click', () => {
      clearAll();
    });
    // Botão debug
    debugBtn.addEventListener('click', () => {
      if (debugPanel.style.display === 'none' || debugPanel.style.display === '') {
        debugPanel.style.display = 'block';
      } else {
        debugPanel.style.display = 'none';
      }
    });
  })();
  </script>
</body>
</html>
